org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Xlint:-options
android.useAndroidX=true

# Avoid corrupted incremental .tab caches / "Storage is already registered" on Windows
# when all plugins share ../../build (see android/build.gradle.kts).
kotlin.incremental=false
